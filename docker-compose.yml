services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery-api
    ports:
      - "${PORT:-3000}:3000"

    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/delivery-backend
      - MONGODB_TEST_URI=mongodb://mongo:27017/delivery-backend-test
      - JWT_SECRET=your_jwt_secret_here
      - JWT_EXPIRES_IN=8h
      - SEED_ADMIN_EMAIL=admin@rightware.com
      - SEED_ADMIN_PASSWORD=Admin@1234
      - ENV_LOADED=true
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - delivery-network
    volumes:
      - ./logs:/app/logs

  mongo:
    image: mongo:6
    container_name: delivery-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      - MONGO_INITDB_DATABASE=${DB_NAME:-delivery}
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - delivery-network

networks:
  delivery-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
